language: go

go:
  - 1.14.x
services:
  - docker
script:
  - GOPROXY=direct go test -v ./cmd/nps/
os:
  - linux
before_deploy:
  - chmod +x ./build.sh && chmod +x ./build.android.sh && ./build.sh

deploy:
  provider: releases
  edge: true
  token: ${GH_TOKEN}
  cleanup: false
  file:
  - freebsd_386_client.zip
  - freebsd_386_server.zip
  - freebsd_amd64_client.zip
  - freebsd_amd64_server.zip
  - freebsd_arm_client.zip
  - freebsd_arm_server.zip
  - linux_386_client.zip
  - linux_386_server.zip
  - linux_amd64_client.zip
  - linux_amd64_server.zip
  - linux_arm64_client.zip
  - linux_arm64_server.zip
  - linux_arm_v5_client.zip
  - linux_arm_v6_client.zip
  - linux_arm_v7_client.zip
  - linux_arm_v5_server.zip
  - linux_arm_v6_server.zip
  - linux_arm_v7_server.zip
  - linux_mips64le_client.zip
  - linux_mips64le_server.zip
  - linux_mips64_client.zip
  - linux_mips64_server.zip
  - linux_mipsle_client.zip
  - linux_mipsle_server.zip
  - linux_mips_client.zip
  - linux_mips_server.zip
  - darwin_amd64_client.zip
  - darwin_amd64_server.zip
  - windows_386_client.zip
  - windows_386_server.zip
  - windows_amd64_client.zip
  - windows_amd64_server.zip
  - npc_syno.spk
  - npc_sdk.zip
  - android_client.apk
  on:
    tags: true
    all_branches: true
